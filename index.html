<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0a">
<title>Leberversagen – Thede</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --accent: #e8ff47;
    --accent2: #ff4d6d;
    --text: #f0f0f0;
    --muted: #555;
    --card-w: min(75vw, 320px);
    --card-h: calc(var(--card-w) * 1.54);
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    overflow: hidden;
    touch-action: manipulation;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 24px 16px 32px;
    gap: 0;
  }

  /* Header */
  header {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    flex-shrink: 0;
  }

  .title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(28px, 7vw, 42px);
    letter-spacing: 0.04em;
    line-height: 1;
    color: var(--accent);
  }

  .subtitle {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: 4px;
  }

  .counter-box {
    text-align: right;
    flex-shrink: 0;
  }

  .counter-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 40px;
    color: var(--text);
    line-height: 1;
  }

  .counter-label {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  /* Card Stage */
  .stage {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    perspective: 1000px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    position: relative;
  }

  /* Stack illusion */
  .stack-shadow {
    position: absolute;
    width: var(--card-w);
    height: var(--card-h);
    border-radius: 14px;
    background: var(--surface);
    border: 1px solid #222;
  }
  .stack-shadow:nth-child(1) { transform: rotate(-3deg) translate(-4px, 4px); }
  .stack-shadow:nth-child(2) { transform: rotate(2deg) translate(3px, 3px); }

  .card-wrapper {
    position: relative;
    width: var(--card-w);
    height: var(--card-h);
    z-index: 10;
  }

  .card {
    width: 100%;
    height: 100%;
    border-radius: 14px;
    overflow: hidden;
    background: var(--surface);
    box-shadow: 0 20px 60px rgba(0,0,0,0.7), 0 0 0 1px #222;
    position: relative;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }

  .card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    opacity: 0;
    transition: opacity 0.2s ease;
  }

  .card img.loaded { opacity: 1; }

  /* Empty state */
  .card-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--muted);
  }

  .card-placeholder .icon {
    font-size: 48px;
    opacity: 0.4;
  }

  .card-placeholder p {
    font-size: 14px;
    letter-spacing: 0.08em;
  }

  /* Pull animation */
  @keyframes pullCard {
    0%   { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
    30%  { transform: translateY(-30px) rotate(-4deg) scale(1.04); opacity: 1; }
    70%  { transform: translateY(60px) rotate(3deg) scale(0.95); opacity: 0; }
    100% { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
  }

  .card.animating { animation: pullCard 0.45s cubic-bezier(0.4, 0, 0.2, 1) forwards; }

  /* Stage active state */
  .stage:active .card:not(.animating) {
    transform: scale(0.97);
    box-shadow: 0 10px 30px rgba(0,0,0,0.6);
  }

  /* Bottom area */
  .bottom {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
  }

  .draw-btn {
    width: 100%;
    max-width: 320px;
    padding: 18px;
    border: none;
    border-radius: 12px;
    background: var(--accent);
    color: #0a0a0a;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: transform 0.1s, background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .draw-btn:active { transform: scale(0.97); background: #d4eb38; }

  .reset-btn {
    background: none;
    border: 1px solid var(--muted);
    border-radius: 8px;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 8px 20px;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .reset-btn:active { border-color: var(--text); color: var(--text); }

  /* Progress bar */
  .progress-track {
    width: 100%;
    max-width: 320px;
    height: 3px;
    background: #1e1e1e;
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  /* Toast */
  .toast {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.8);
    background: var(--accent2);
    color: white;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    letter-spacing: 0.08em;
    padding: 20px 32px;
    border-radius: 14px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s, transform 0.2s;
    z-index: 100;
    text-align: center;
  }

  .toast.show {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }
</style>
</head>
<body>

<header>
  <div>
    <div class="title">Leberversagen</div>
    <div class="subtitle">Thede Edition</div>
  </div>
  <div class="counter-box">
    <div class="counter-num" id="deckCount">55</div>
    <div class="counter-label">im Deck</div>
  </div>
</header>

<div class="stage" id="stage" onclick="drawCard()">
  <div class="stack-shadow"></div>
  <div class="stack-shadow"></div>
  <div class="card-wrapper">
    <div class="card" id="card">
      <div class="card-placeholder">
        <div class="icon">🎴</div>
        <p>Tippe zum Ziehen</p>
      </div>
    </div>
  </div>
</div>

<div class="bottom">
  <div class="progress-track">
    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
  </div>
  <button class="draw-btn" onclick="drawCard()">Karte ziehen</button>
  <button class="reset-btn" onclick="resetDeck()">↺ Neu mischen</button>
</div>

<div class="toast" id="toast">Deck leer!<br>Wird neu gemischt…</div>

<script>
// ---- DECK SETUP ----
// Bilder: IMG_3756.jpg bis IMG_3810.jpg (55 Karten)
const originalDeck = [];
for (let i = 3756; i <= 3810; i++) {
  originalDeck.push(`IMG_${i}.jpg`);
}

let deck = [];
let drawnCount = 0;
const total = originalDeck.length;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function resetDeck(silent = false) {
  deck = shuffle(originalDeck);
  drawnCount = 0;
  updateUI();
  if (!silent) {
    document.getElementById('card').innerHTML = `
      <div class="card-placeholder">
        <div class="icon">🎴</div>
        <p>Tippe zum Ziehen</p>
      </div>`;
  }
}

function updateUI() {
  document.getElementById('deckCount').textContent = deck.length;
  const pct = (drawnCount / total) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.innerHTML = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function drawCard() {
  if (deck.length === 0) {
    showToast('Deck leer!<br>Wird neu gemischt…');
    setTimeout(() => resetDeck(false), 600);
    return;
  }

  const cardEl = document.getElementById('card');
  cardEl.classList.add('animating');

  setTimeout(() => {
    const src = deck.pop();
    drawnCount++;
    updateUI();

    const img = new Image();
    img.onload = () => img.classList.add('loaded');
    img.src = src;
    img.alt = 'Karte';

    cardEl.innerHTML = '';
    cardEl.appendChild(img);

    // Preload next card
    if (deck.length > 0) {
      const preload = new Image();
      preload.src = deck[deck.length - 1];
    }

    cardEl.classList.remove('animating');
  }, 220);
}

// Init
resetDeck(true);
</script>
</body>
</html>
